name: Generate Stats Images

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      # Cache pip dependencies
      # See: https://github.com/actions/cache/blob/master/examples.md#python---pip
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install requirements
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install -r requirements.txt

      # Required secrets:
      #   ACCESS_TOKEN  — Personal Access Token with read:user and repo scopes
      # Optional secrets:
      #   EXCLUDED            — Comma-separated repo names to exclude
      #   EXCLUDED_LANGS      — Comma-separated language names to exclude
      #   COUNT_STATS_FROM_FORKS — Set to any value to include forked repos
      # Auto-provided by GitHub Actions (do not create as secrets):
      #   GITHUB_TOKEN  — Read/write token for this repo
      #   GITHUB_ACTOR  — Username of the user who triggered the workflow
      - name: Generate images
        run: python3 generate_images.py
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXCLUDED: ${{ secrets.EXCLUDED }}
          EXCLUDED_LANGS: ${{ secrets.EXCLUDED_LANGS }}
          COUNT_STATS_FROM_FORKS: ${{ secrets.COUNT_STATS_FROM_FORKS }}

      # Push only the generated/ folder to the output branch.
      # Copy before checkout so new SVGs survive the branch switch.
      - name: Commit to the output branch of repo
        run: |
          git config --global user.name "github-stats[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp -r generated /tmp/stats_generated
          git checkout output 2>/dev/null || (git checkout --orphan output && git rm -rf .)
          cp -r /tmp/stats_generated ./generated
          git add generated/
          git commit -m 'Update generated files' || echo
          git push origin output -f
